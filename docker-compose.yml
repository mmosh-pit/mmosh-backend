version: "3.8"
services:
  backend-app:
    container_name: backend_app
    build:
      dockerfile: Dockerfile.dev
      context: ./
    volumes:
      - ./:/app
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://myuser:mypassword@postgres:5432/database?sslmode=disable
    ports:
      - 6050:6050
    depends_on:
      postgres:
        condition: service_healthy
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: database
    hostname: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    env_file:
      - .env
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  app: null
  postgres-data:
    driver: local
    name: postgres-data

networks:
  kinship-network:
